<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1B5E20"/>
      <stop offset="55%"  stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <style>
      @keyframes fl  { 0%,100%{ transform:translateY(0)  } 50%{ transform:translateY(-13px) } }
      @keyframes sc  { 0%,100%{ transform:translateY(0)  } 40%{ transform:translateY(-8px)  } }
      @keyframes fu  { from{ opacity:0; transform:translateY(16px) } to{ opacity:1; transform:translateY(0) } }
      @keyframes spd { 0%,100%{ opacity:.55 } 50%{ opacity:.9 } }
      .a1 { animation:fl 3.5s ease-in-out infinite }
      .a2 { animation:fl 4.2s ease-in-out infinite  .6s }
      .a3 { animation:fl 3.0s ease-in-out infinite 1.2s }
      .a6 { animation:fl 5.0s ease-in-out infinite 1.5s }
      .sk { animation:sc 2.6s ease-in-out infinite }
      .sp { animation:spd 2.6s ease-in-out infinite }
      .t1 { animation:fu  .8s ease-out forwards }
      .t2 { animation:fu  .8s ease-out .38s both }
    </style>
  </defs>

  <!-- ── Background ── -->
  <rect width="900" height="200" rx="16" fill="url(#g)"/>
  <circle cx="55"  cy="22"  r="70" fill="white" fill-opacity=".03"/>
  <circle cx="845" cy="178" r="80" fill="white" fill-opacity=".03"/>

  <!-- ════════════════ LEFT VEGETABLES ════════════════ -->

  <!-- Leaf · left -->
  <g class="a6" transform="translate(44,108)">
    <path d="M0,-58 C-26,-58 -36,-28 -20,0 C-8,22 0,52 0,52
             C0,52 8,22 20,0 C36,-28 26,-58 0,-58Z"
          fill="#66BB6A" fill-opacity=".82"/>
    <line x1="0" y1="52" x2="0" y2="-50"
          stroke="#4CAF50" stroke-width="1.5" stroke-opacity=".5"/>
  </g>

  <!-- Tomato -->
  <g class="a1" transform="translate(140,100)">
    <path d="M0,-30 C-5,-43 -13,-39 -9,-30Z" fill="#4CAF50"/>
    <path d="M0,-30 C5,-43 13,-39 9,-30Z"   fill="#81C784"/>
    <path d="M0,-30 C1,-45 4,-41 3,-30Z"    fill="#66BB6A"/>
    <circle r="28" fill="#F44336"/>
    <path d="M0,-28 C-14,0 -14,0 0,28" stroke="#C62828" stroke-width="1" fill="none" stroke-opacity=".28"/>
    <path d="M0,-28 C14,0 14,0 0,28"   stroke="#C62828" stroke-width="1" fill="none" stroke-opacity=".28"/>
    <ellipse cx="-10" cy="-11" rx="6" ry="4"
             fill="white" fill-opacity=".28" transform="rotate(-30,-10,-11)"/>
  </g>

  <!-- Carrot -->
  <g class="a3" transform="translate(222,108)">
    <path d="M-3,-62 C-9,-79 -6,-89 -2,-83 C0,-74 -3,-62 -3,-62Z" fill="#81C784"/>
    <path d="M1,-64 C1,-83 5,-91  6,-85 C5,-75  1,-64  1,-64Z"    fill="#66BB6A"/>
    <path d="M5,-62 C11,-79 12,-87 8,-83 C5,-74  5,-62  5,-62Z"   fill="#4CAF50"/>
    <path d="M-15,-58 C-17,-10 -1,48 0,61 C1,48 17,-10 15,-58Z"  fill="#FF6F00"/>
    <line x1="-13" y1="-38" x2="13" y2="-38" stroke="#E65100" stroke-width=".9" stroke-opacity=".4"/>
    <line x1="-12" y1="-18" x2="12" y2="-18" stroke="#E65100" stroke-width=".9" stroke-opacity=".4"/>
    <line x1="-10" y1="2"   x2="10" y2="2"   stroke="#E65100" stroke-width=".9" stroke-opacity=".4"/>
    <line x1="-7"  y1="22"  x2="7"  y2="22"  stroke="#E65100" stroke-width=".9" stroke-opacity=".4"/>
    <ellipse cx="-7" cy="-42" rx="3" ry="6"
             fill="white" fill-opacity=".18" transform="rotate(-15,-7,-42)"/>
  </g>

  <!-- ════════════════ CENTER TEXT ════════════════ -->

  <text class="t1" x="415" y="90"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="50" font-weight="800"
    fill="white" text-anchor="middle" letter-spacing="2">BãoDaFeira</text>

  <text class="t2" x="415" y="130"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="13.5" fill="rgba(255,255,255,.82)" text-anchor="middle" letter-spacing=".3">
    Compre direto do produtor · Sem intermediários · Preço justo
  </text>

  <!-- ════════════════ RIGHT — BROCCOLI ════════════════ -->

  <g class="a2" transform="translate(648,108)">
    <rect x="-5" y="22" width="10" height="44" fill="#558B2F" rx="5"/>
    <circle cy="12"  r="22" fill="#388E3C"/>
    <circle cx="-19" cy="23" r="16" fill="#4CAF50"/>
    <circle cx="19"  cy="23" r="16" fill="#4CAF50"/>
    <circle cy="0"   r="12" fill="#66BB6A"/>
    <circle cx="-13" cy="11" r="9" fill="#81C784"/>
    <circle cx="13"  cy="11" r="9" fill="#81C784"/>
  </g>

  <!-- ════════════════ SCOOTER DE ENTREGA ════════════════ -->

  <!-- Speed lines — piscam junto com o bounce da moto -->
  <g class="sp">
    <line x1="725" y1="105" x2="698" y2="105" stroke="#C8E6C9" stroke-width="3" stroke-linecap="round"/>
    <line x1="722" y1="120" x2="700" y2="120" stroke="#C8E6C9" stroke-width="2" stroke-linecap="round"/>
    <line x1="726" y1="91"  x2="706" y2="91"  stroke="#C8E6C9" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Moto (mix-blend-mode:multiply elimina o fundo branco do PNG) -->
  <image class="sk"
    href="../transferir.png"
    x="728" y="28" width="162" height="133"
    style="mix-blend-mode:multiply"/>

</svg>
